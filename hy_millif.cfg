
MEMORY {
# ZERO
    ZERO: type = rw, start = $0000, size = $0100; 
    STACKS: type = rw, start = $0400, size = $0200, file = "";
    RAM:  type = rw, start = $0600, fill=$00, size = $7C00, file = "temp/hyforth.bin";
}

SEGMENTS {
    ZP:     load = ZERO, type = zp;
    STACKS:   load = STACKS, type = rw, offset = $0000;
    CODE:     load = RAM,  type = rw, offset = $0000;
}


